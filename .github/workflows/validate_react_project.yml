name: React Validation

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.12.0

      - name: Instalar pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.3.0
          run_install: false
          cache: true
          cache_dependency_path: ${{ github.workspace }}/${{ inputs.project }}/pnpm-lock.yaml
          package_json_file: ${{ github.workspace }}/${{ inputs.project }}/package.json
      
      - name: Validar instalación de pnpm
        run: pnpm --version

      - name: Instalar dependencias
        run: |
          pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}/${{ inputs.project }}

      - name: Compilar proyecto
        run: |
          pnpm run build
        working-directory: ${{ github.workspace }}/${{ inputs.project }}
        
      - name: Subir build como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ inputs.project }}
          path: ${{ github.workspace }}/${{ inputs.project }}/dist
  
  message-success:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Mensaje de aprobacion
        run: echo "El proyecto ${{ inputs.project }} validado"